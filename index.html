<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Focus — Task Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a33;
    --accent: #c8f05a;
    --accent2: #5af0c8;
    --accent3: #f05a8a;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3a3a48;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Evita selección de texto al arrastrar en iOS */
    -webkit-user-select: none;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(200,240,90,0.035) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(90,240,200,0.035) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Permitir selección de texto en inputs y textareas */
  input, textarea, select {
    -webkit-user-select: text;
    user-select: text;
  }

  /* ── HEADER ──────────────────────────────────────────── */
  header {
    position: relative;
    z-index: 10;
    padding: 22px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 16px; height: 16px; }

  .logo-text {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .date-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .progress-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px 13px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .progress-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.2s ease infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.75); }
  }

  /* ── RESET BANNER ────────────────────────────────────── */
  .reset-banner {
    position: relative;
    z-index: 9;
    background: rgba(200,240,90,0.07);
    border-bottom: 1px solid rgba(200,240,90,0.18);
    padding: 10px 36px;
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    animation: slideDown 0.35s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .reset-banner svg { width: 13px; height: 13px; flex-shrink: 0; }

  .reset-banner-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    opacity: 0.55;
    padding: 2px;
    display: flex;
    align-items: center;
    transition: opacity 0.12s;
  }
  .reset-banner-close:hover { opacity: 1; }
  .reset-banner-close svg { width: 11px; height: 11px; }

  /* ── MAIN ────────────────────────────────────────────── */
  main {
    position: relative;
    z-index: 1;
    padding: 28px 36px;
    max-width: 1380px;
    margin: 0 auto;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .section-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--text);
  }
  .section-title span { color: var(--accent); }

  .add-task-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--accent);
    color: #0e0e11;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .add-task-btn:hover {
    background: #d2f562;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(200,240,90,0.28);
  }
  .add-task-btn svg { width: 14px; height: 14px; }

  /* ── STATS ───────────────────────────────────────────── */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .stat-card {
    flex: 1;
    min-width: 110px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .stat-card.total .stat-value { color: var(--text); }
  .stat-card.todo  .stat-value { color: #9090b0; }
  .stat-card.prog  .stat-value { color: var(--accent2); }
  .stat-card.done  .stat-value { color: var(--accent); }

  /* ── PROGRESS BAR ────────────────────────────────────── */
  .global-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .global-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── FILTER BAR ──────────────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-right: 2px;
  }

  .filter-btn {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 11px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:hover { border-color: #3a3a48; color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e11; font-weight: 700; }

  .search-wrap { position: relative; margin-left: auto; }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    display: flex;
  }
  .search-icon svg { width: 12px; height: 12px; }

  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px 14px 5px 30px;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    outline: none;
    width: 185px;
    transition: all 0.2s;
    -webkit-user-select: text;
    user-select: text;
  }
  .search-input:focus { border-color: var(--accent); width: 225px; }
  .search-input::placeholder { color: var(--text-dim); }

  /* ── KANBAN ──────────────────────────────────────────── */
  .kanban {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    align-items: start;
  }

  .column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .column.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .col-header {
    padding: 12px 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .col-title {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .col-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .col-todo     .col-dot { background: #5a5a70; }
  .col-progress .col-dot { background: var(--accent2); }
  .col-done     .col-dot { background: var(--accent); }

  .col-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 1px 8px;
  }

  .col-body {
    padding: 9px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── TASK CARDS ──────────────────────────────────────── */
  .task-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    cursor: grab;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.2s ease;
    touch-action: none; /* Clave para iOS: evita scroll al tocar la tarjeta */
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 2px 0 0 2px;
  }
  .task-card[data-priority="alta"]::before  { background: var(--accent3); }
  .task-card[data-priority="media"]::before { background: #e8c040; }
  .task-card[data-priority="baja"]::before  { background: var(--accent2); }

  .task-card:hover {
    border-color: #353545;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }

  /* Estado mientras se arrastra */
  .task-card.dragging {
    opacity: 0.3;
    cursor: grabbing;
  }

  /* Clon flotante durante el drag en touch */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.92;
    transform: rotate(2deg) scale(1.04);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    border-radius: var(--radius-sm);
    transition: transform 0.1s;
    border: 1px solid var(--accent);
    background: var(--surface2);
    padding: 11px 13px;
    max-width: 280px;
  }

  .task-top {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    margin-bottom: 6px;
  }

  .drag-handle {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--text-dim);
    cursor: grab;
    display: flex;
    padding: 4px; /* área táctil más grande */
    margin: -4px;
  }
  .drag-handle svg { width: 11px; height: 11px; }

  .task-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.45;
    letter-spacing: 0;
  }

  .col-done .task-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .task-actions {
    display: flex;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.12s;
    flex-shrink: 0;
  }
  .task-card:hover .task-actions { opacity: 1; }

  /* En móvil siempre mostrar los botones */
  @media (hover: none) {
    .task-actions { opacity: 1; }
  }

  .task-btn {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 5px;
    background: var(--border);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .task-btn:hover { background: var(--surface); color: var(--text); }
  .task-btn.delete:hover { background: rgba(240,90,138,0.17); color: var(--accent3); }
  .task-btn svg { width: 11px; height: 11px; }

  .task-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    margin: 0 0 6px 18px;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
    padding-left: 18px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }

  .priority-tag[data-p="alta"]  { background: rgba(240,90,138,0.13); color: var(--accent3); }
  .priority-tag[data-p="media"] { background: rgba(232,192,64,0.13); color: #e8c040; }
  .priority-tag[data-p="baja"]  { background: rgba(90,240,200,0.13); color: var(--accent2); }

  .category-tag { background: rgba(255,255,255,0.05); color: var(--text-muted); }

  .task-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── EMPTY STATE ─────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 26px 12px;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .empty-icon { font-size: 20px; opacity: 0.3; }
  .empty-text {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── DROP INDICATOR ──────────────────────────────────── */
  .drop-indicator {
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    margin: 2px 0;
    display: none;
  }
  .drop-indicator.visible { display: block; }

  /* ── MODAL ───────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px;
    width: 100%;
    max-width: 450px;
    box-shadow: var(--shadow-lg);
    transform: translateY(10px) scale(0.98);
    transition: transform 0.2s ease;
    -webkit-user-select: text;
    user-select: text;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }

  .modal-close {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-close:hover { background: var(--surface2); color: var(--text); }
  .modal-close svg { width: 11px; height: 11px; }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 11px;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px; /* 16px evita zoom automático en iOS */
    font-weight: 500;
    outline: none;
    transition: border-color 0.13s;
    appearance: none;
    -webkit-appearance: none;
    -webkit-user-select: text;
    user-select: text;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: none; min-height: 68px; line-height: 1.5; }
  .form-select option { background: #1e1e24; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-cancel {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-cancel:hover { border-color: #3a3a48; color: var(--text); }

  .btn-save {
    padding: 8px 20px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #0e0e11;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.13s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-save:hover { background: #d2f562; }

  /* ── TOAST ───────────────────────────────────────────── */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 15px;
    font-size: 12px;
    font-weight: 600;
    box-shadow: var(--shadow);
    animation: toastIn 0.2s ease;
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text);
  }
  .toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  @keyframes toastIn  { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }
  @keyframes toastOut { from { opacity:1; transform:translateX(0);    } to { opacity:0; transform:translateX(12px); } }

  /* ── RESPONSIVE ──────────────────────────────────────── */
  @media (max-width: 860px) {
    .kanban { grid-template-columns: 1fr; }
    header, main { padding-left: 18px; padding-right: 18px; }
    .reset-banner { padding-left: 18px; padding-right: 18px; }
    .modal { margin: 0 16px; }
  }
  @media (max-width: 520px) {
    .date-display { display: none; }
    .search-input { width: 140px; }
    .search-input:focus { width: 165px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">
      <svg fill="none" viewBox="0 0 16 16" stroke="#0e0e11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2.5 8.5l3.5 3.5 7-7"/>
      </svg>
    </div>
    <span class="logo-text">Daily<span>Focus</span></span>
  </div>
  <div class="header-right">
    <span class="date-display" id="date-display"></span>
    <div class="progress-pill">
      <div class="progress-dot"></div>
      <span id="progress-text">0 / 0 completadas</span>
    </div>
  </div>
</header>

<!-- RESET BANNER -->
<div class="reset-banner" id="reset-banner" style="display:none;">
  <svg fill="none" viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 7A5 5 0 1 1 7 2"/><path d="M9 2h3v3"/>
  </svg>
  ¡Nuevo día! Todas las tareas se reiniciaron a Pendiente.
  <button class="reset-banner-close" onclick="document.getElementById('reset-banner').style.display='none'">
    <svg fill="none" viewBox="0 0 11 11" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="1" y1="1" x2="10" y2="10"/><line x1="10" y1="1" x2="1" y2="10"/>
    </svg>
  </button>
</div>

<!-- MAIN -->
<main>
  <div class="top-bar">
    <h1 class="section-title">Mis <span>Tareas</span></h1>
    <button class="add-task-btn" onclick="openModal()">
      <svg fill="none" viewBox="0 0 14 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="7" y1="1.5" x2="7" y2="12.5"/><line x1="1.5" y1="7" x2="12.5" y2="7"/>
      </svg>
      Nueva Tarea
    </button>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card total"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card todo"> <div class="stat-value" id="stat-todo">0</div> <div class="stat-label">Pendiente</div></div>
    <div class="stat-card prog"> <div class="stat-value" id="stat-prog">0</div>  <div class="stat-label">En Progreso</div></div>
    <div class="stat-card done"> <div class="stat-value" id="stat-done">0</div>  <div class="stat-label">Completadas</div></div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="global-bar"><div class="global-bar-fill" id="global-bar" style="width:0%"></div></div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <span class="filter-label">Filtrar</span>
    <button class="filter-btn active" onclick="setFilter(this,'all')">Todas</button>
    <button class="filter-btn" onclick="setFilter(this,'alta')">🔴 Alta</button>
    <button class="filter-btn" onclick="setFilter(this,'media')">🟡 Media</button>
    <button class="filter-btn" onclick="setFilter(this,'baja')">🟢 Baja</button>
    <div class="search-wrap">
      <span class="search-icon"><svg fill="none" viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6" cy="6" r="4"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg></span>
      <input class="search-input" type="text" placeholder="Buscar..." oninput="setSearch(this.value)">
    </div>
  </div>

  <!-- KANBAN -->
  <div class="kanban">
    <div class="column col-todo" id="col-todo">
      <div class="col-header">
        <div class="col-title"><div class="col-dot"></div>Pendiente</div>
        <span class="col-count" id="count-todo">0</span>
      </div>
      <div class="col-body" id="body-todo"></div>
    </div>

    <div class="column col-progress" id="col-progress">
      <div class="col-header">
        <div class="col-title"><div class="col-dot"></div>En Progreso</div>
        <span class="col-count" id="count-progress">0</span>
      </div>
      <div class="col-body" id="body-progress"></div>
    </div>

    <div class="column col-done" id="col-done">
      <div class="col-header">
        <div class="col-title"><div class="col-dot"></div>Completado</div>
        <span class="col-count" id="count-done">0</span>
      </div>
      <div class="col-body" id="body-done"></div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Nueva Tarea</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg fill="none" viewBox="0 0 11 11" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="1" y1="1" x2="10" y2="10"/><line x1="10" y1="1" x2="1" y2="10"/>
        </svg>
      </button>
    </div>
    <div class="form-group">
      <label class="form-label">Título *</label>
      <input class="form-input" type="text" id="input-title" placeholder="¿Qué necesitas hacer?">
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-textarea" id="input-desc" placeholder="Detalles opcionales..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prioridad</label>
        <select class="form-select" id="input-priority">
          <option value="baja">🟢 Baja</option>
          <option value="media" selected>🟡 Media</option>
          <option value="alta">🔴 Alta</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <select class="form-select" id="input-category">
          <option value="trabajo">trabajo</option>
          <option value="personal">personal</option>
          <option value="salud">salud</option>
          <option value="estudio">estudio</option>
          <option value="hogar">hogar</option>
          <option value="otro">otro</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="input-status">
          <option value="todo">Pendiente</option>
          <option value="progress">En Progreso</option>
          <option value="done">Completado</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Hora (opcional)</label>
        <input class="form-input" type="time" id="input-time">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toast-container"></div>

<script>
// ─── HELPERS ─────────────────────────────────────────────────────────────────
const uid  = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const esc  = s  => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let tasks        = JSON.parse(localStorage.getItem('df2_tasks') || '[]');
let editingId    = null;
let activeFilter = 'all';
let searchQuery  = '';

// ─── DRAG STATE ───────────────────────────────────────────────────────────────
let dragId      = null;
let ghost       = null;
let ghostOffX   = 0;
let ghostOffY   = 0;
let lastDropCol = null;  // columna destino actual

// ─── DAILY RESET ─────────────────────────────────────────────────────────────
function checkDailyReset() {
  const lastDay = localStorage.getItem('df2_last_day');
  const today   = todayKey();
  if (lastDay && lastDay !== today && tasks.length > 0) {
    tasks = tasks.map(t => ({ ...t, status: 'todo' }));
    save();
    document.getElementById('reset-banner').style.display = 'flex';
  }
  localStorage.setItem('df2_last_day', today);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  const now  = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('date-display').textContent =
    now.toLocaleDateString('es-MX', opts);

  checkDailyReset();

  if (tasks.length === 0 && !localStorage.getItem('df2_initialized')) {
    tasks = [
      { id:uid(), title:'Revisar correos importantes',        desc:'Responder al equipo de diseño',  priority:'alta',  category:'trabajo',  status:'todo',     time:'09:00', createdAt:Date.now() },
      { id:uid(), title:'Preparar presentación del proyecto', desc:'',                               priority:'alta',  category:'trabajo',  status:'progress', time:'14:00', createdAt:Date.now() },
      { id:uid(), title:'Sesión de ejercicio 30 min',         desc:'Cardio + estiramientos',         priority:'media', category:'salud',    status:'todo',     time:'07:00', createdAt:Date.now() },
      { id:uid(), title:'Leer capítulo de libro',             desc:'',                               priority:'baja',  category:'personal', status:'done',     time:'',      createdAt:Date.now() },
      { id:uid(), title:'Llamar al proveedor',                desc:'Confirmar entrega del pedido',   priority:'media', category:'trabajo',  status:'todo',     time:'11:30', createdAt:Date.now() },
      { id:uid(), title:'Hacer la compra semanal',            desc:'',                               priority:'baja',  category:'hogar',    status:'done',     time:'',      createdAt:Date.now() },
    ];
    save();
  }
  localStorage.setItem('df2_initialized', '1');
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const cols = { todo:[], progress:[], done:[] };

  tasks
    .filter(t =>
      (activeFilter === 'all' || t.priority === activeFilter) &&
      (!searchQuery || t.title.toLowerCase().includes(searchQuery.toLowerCase()))
    )
    .forEach(t => { if (cols[t.status]) cols[t.status].push(t); });

  renderCol('todo',     cols.todo);
  renderCol('progress', cols.progress);
  renderCol('done',     cols.done);
  updateStats();
}

function renderCol(status, items) {
  const body  = document.getElementById(`body-${status}`);
  const count = document.getElementById(`count-${status}`);

  body.innerHTML = items.length === 0
    ? `<div class="empty-state">
         <div class="empty-icon">${status==='done'?'✓':status==='progress'?'◎':'○'}</div>
         <div class="empty-text">${status==='done'?'Sin completadas':status==='progress'?'Nada en progreso':'Sin pendientes'}</div>
       </div>`
    : items.map(cardHTML).join('');

  count.textContent = items.length;
  attachEvents();
}

function cardHTML(t) {
  const time = t.time ? `<span class="task-time">${t.time}</span>` : '';
  return `
    <div class="task-card" id="card-${t.id}" data-id="${t.id}" data-priority="${t.priority}">
      <div class="task-top">
        <div class="drag-handle" data-drag="${t.id}">
          <svg fill="none" viewBox="0 0 11 11" stroke="currentColor" stroke-width="1.2">
            <circle cx="3.5" cy="2.5" r="0.7" fill="currentColor"/>
            <circle cx="7.5" cy="2.5" r="0.7" fill="currentColor"/>
            <circle cx="3.5" cy="5.5" r="0.7" fill="currentColor"/>
            <circle cx="7.5" cy="5.5" r="0.7" fill="currentColor"/>
            <circle cx="3.5" cy="8.5" r="0.7" fill="currentColor"/>
            <circle cx="7.5" cy="8.5" r="0.7" fill="currentColor"/>
          </svg>
        </div>
        <span class="task-title">${esc(t.title)}</span>
        <div class="task-actions">
          <button class="task-btn" data-action="edit" data-id="${t.id}" title="Editar">
            <svg fill="none" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8.5 1.5l2 2-6 6H2.5v-2l6-6z"/>
            </svg>
          </button>
          <button class="task-btn delete" data-action="delete" data-id="${t.id}" title="Eliminar">
            <svg fill="none" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
              <polyline points="1.5,3 10.5,3"/>
              <path d="M4 3V2a1 1 0 011-1h2a1 1 0 011 1v1"/>
              <path d="M3.5 3l.5 6.5h4l.5-6.5"/>
            </svg>
          </button>
        </div>
      </div>
      ${t.desc ? `<p class="task-desc">${esc(t.desc)}</p>` : ''}
      <div class="task-meta">
        <span class="tag priority-tag" data-p="${t.priority}">${t.priority}</span>
        <span class="tag category-tag">${t.category}</span>
        ${time}
      </div>
    </div>`;
}

function updateStats() {
  const total = tasks.length;
  const done  = tasks.filter(t => t.status === 'done').length;
  const prog  = tasks.filter(t => t.status === 'progress').length;
  const todo  = tasks.filter(t => t.status === 'todo').length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-todo').textContent  = todo;
  document.getElementById('stat-prog').textContent  = prog;
  document.getElementById('stat-done').textContent  = done;
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} completadas`;
}

// ─── ATTACH EVENTS (mouse + touch) ───────────────────────────────────────────
function attachEvents() {
  // Botones de editar / eliminar
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (btn.dataset.action === 'edit')   editTask(id);
      if (btn.dataset.action === 'delete') deleteTask(id);
    });
  });

  // Drag clásico para desktop
  document.querySelectorAll('.task-card').forEach(card => {
    card.setAttribute('draggable', 'true');

    card.addEventListener('dragstart', e => {
      dragId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      dragId = null;
    });
  });

  // Touch drag para iOS y móviles
  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('touchstart', onTouchStart, { passive: false });
  });
}

// ─── TOUCH DRAG ──────────────────────────────────────────────────────────────
function onTouchStart(e) {
  // Si el toque fue en un botón de acción, no iniciar drag
  if (e.target.closest('[data-action]')) return;

  const card  = e.currentTarget;
  const touch = e.touches[0];
  const rect  = card.getBoundingClientRect();

  dragId    = card.dataset.id;
  ghostOffX = touch.clientX - rect.left;
  ghostOffY = touch.clientY - rect.top;

  // Crear el clon fantasma
  ghost = card.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.width  = rect.width + 'px';
  ghost.style.left   = (touch.clientX - ghostOffX) + 'px';
  ghost.style.top    = (touch.clientY - ghostOffY) + 'px';
  document.body.appendChild(ghost);

  card.classList.add('dragging');

  document.addEventListener('touchmove',  onTouchMove,  { passive: false });
  document.addEventListener('touchend',   onTouchEnd,   { passive: false });
  document.addEventListener('touchcancel',onTouchCancel,{ passive: false });

  e.preventDefault(); // Evita scroll y selección de texto en iOS
}

function onTouchMove(e) {
  if (!ghost || !dragId) return;
  e.preventDefault();

  const touch = e.touches[0];

  // Mover el fantasma
  ghost.style.left = (touch.clientX - ghostOffX) + 'px';
  ghost.style.top  = (touch.clientY - ghostOffY) + 'px';

  // Detectar sobre qué columna está el dedo
  ghost.style.display = 'none'; // ocultar temporalmente para que elementFromPoint funcione
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  ghost.style.display = '';

  const col = el ? el.closest('.column') : null;

  // Limpiar highlight anterior
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  lastDropCol = null;

  if (col) {
    col.classList.add('drag-over');
    lastDropCol = col.id.replace('col-', '');
  }
}

function onTouchEnd(e) {
  if (!dragId) return;
  e.preventDefault();

  // Aplicar el drop si hay columna destino
  if (lastDropCol) {
    const t = tasks.find(t => t.id === dragId);
    if (t && t.status !== lastDropCol) {
      t.status = lastDropCol;
      save(); render();
      showToast(`Movida a ${{ todo:'Pendiente', progress:'En Progreso', done:'Completado' }[lastDropCol]}`);
    }
  }

  cleanupTouch();
}

function onTouchCancel() {
  cleanupTouch();
}

function cleanupTouch() {
  if (ghost) { ghost.remove(); ghost = null; }

  const dragging = document.querySelector('.task-card.dragging');
  if (dragging) dragging.classList.remove('dragging');

  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));

  dragId      = null;
  lastDropCol = null;

  document.removeEventListener('touchmove',  onTouchMove);
  document.removeEventListener('touchend',   onTouchEnd);
  document.removeEventListener('touchcancel',onTouchCancel);
}

// ─── DRAG & DROP DESKTOP ─────────────────────────────────────────────────────
['todo','progress','done'].forEach(status => {
  const col = document.getElementById(`col-${status}`);
  col.addEventListener('dragover',  e => { e.preventDefault(); col.classList.add('drag-over'); });
  col.addEventListener('dragleave', ()  => col.classList.remove('drag-over'));
  col.addEventListener('drop',      e  => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (!dragId) return;
    const t = tasks.find(t => t.id === dragId);
    if (t && t.status !== status) {
      t.status = status;
      save(); render();
      showToast(`Movida a ${{ todo:'Pendiente', progress:'En Progreso', done:'Completado' }[status]}`);
    }
  });
});

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Editar Tarea' : 'Nueva Tarea';

  if (id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    document.getElementById('input-title').value    = t.title;
    document.getElementById('input-desc').value     = t.desc || '';
    document.getElementById('input-priority').value = t.priority;
    document.getElementById('input-category').value = t.category;
    document.getElementById('input-status').value   = t.status;
    document.getElementById('input-time').value     = t.time || '';
  } else {
    document.getElementById('input-title').value    = '';
    document.getElementById('input-desc').value     = '';
    document.getElementById('input-priority').value = 'media';
    document.getElementById('input-category').value = 'trabajo';
    document.getElementById('input-status').value   = 'todo';
    document.getElementById('input-time').value     = '';
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('input-title').focus(), 180);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function closeModalOnOverlay(e) { if (e.target === e.currentTarget) closeModal(); }

function saveTask() {
  const inp   = document.getElementById('input-title');
  const title = inp.value.trim();
  if (!title) {
    inp.style.borderColor = 'var(--accent3)';
    inp.focus();
    setTimeout(() => inp.style.borderColor = '', 1400);
    return;
  }

  const data = {
    title,
    desc:     document.getElementById('input-desc').value.trim(),
    priority: document.getElementById('input-priority').value,
    category: document.getElementById('input-category').value,
    status:   document.getElementById('input-status').value,
    time:     document.getElementById('input-time').value,
  };

  if (editingId) {
    const i = tasks.findIndex(t => t.id === editingId);
    if (i >= 0) tasks[i] = { ...tasks[i], ...data };
    showToast('Tarea actualizada');
  } else {
    tasks.unshift({ id: uid(), ...data, createdAt: Date.now() });
    showToast('Tarea creada');
  }

  save(); render(); closeModal();
}

function editTask(id)   { openModal(id); }
function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); save(); render(); showToast('Tarea eliminada'); }

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function setFilter(btn, f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSearch(v) { searchQuery = v; render(); }

// ─── UTILS ────────────────────────────────────────────────────────────────────
function save() { localStorage.setItem('df2_tasks', JSON.stringify(tasks)); }

function showToast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-dot"></div>${msg}`;
  c.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toastOut 0.2s ease forwards';
    setTimeout(() => t.remove(), 210);
  }, 2400);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openModal(); }
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'TEXTAREA') saveTask();
  }
});

// ─── BOOT ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
